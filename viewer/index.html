<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Library — 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; display: block; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); padding: 16px 20px;
            border-radius: 8px; font-size: 14px; line-height: 1.6;
            backdrop-filter: blur(10px);
        }
        #info h2 { font-size: 16px; margin-bottom: 4px; color: #b8a9c9; }
        #info .sku { color: #888; font-size: 12px; }
        #controls {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 20px;
            border-radius: 8px; font-size: 12px; color: #888;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>Safeguard Liquid Hand Soap — Notes of Lavender</h2>
        <span class="sku">SKU: 030772008355 | 15.5 FL OZ</span>
    </div>
    <div id="controls">Drag to rotate · Scroll to zoom · Right-drag to pan</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.set(1.2, 1.0, 1.2);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0.8, 0);

        // Lighting — studio setup
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const key = new THREE.DirectionalLight(0xffffff, 1.5);
        key.position.set(2, 3, 1);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xd0d0ff, 0.6);
        fill.position.set(-1, 2, -1);
        scene.add(fill);

        const rim = new THREE.DirectionalLight(0xfff0e0, 0.8);
        rim.position.set(-1, 1, 2);
        scene.add(rim);

        // Ground plane
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        scene.add(ground);

        // Load model
        const loader = new GLTFLoader();
        const modelPath = '../assets/safeguard/safeguard-liquid-hand-soap-lavender/geo/base_textured.glb';

        loader.load(modelPath, (gltf) => {
            const model = gltf.scene;
            scene.add(model);

            // Center the model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            controls.target.copy(center);
            controls.update();
        }, (progress) => {
            console.log(`Loading: ${(progress.loaded / progress.total * 100).toFixed(0)}%`);
        }, (error) => {
            console.error('Load error:', error);
            document.getElementById('info').innerHTML += '<br><span style="color:#f55">Error loading model. Run from a local server.</span>';
        });

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Render loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
